name: Main Branch SBOM

on:
  push:
    branches: [ main ]
    paths-ignore:
      - sbom/bom.json

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Generate CycloneDX SBOM
        run: ./mvnw -B -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.9.0:makeAggregateBom

      - name: Store SBOM in repository path
        run: |
          mkdir -p sbom
          cp target/bom.json sbom/bom.json

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-main-${{ github.run_number }}.json
          path: xbom/bom.json
          if-no-files-found: error
          retention-days: 30

      - name: Create SBOM Update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(sbom): update main SBOM"
          branch: chore/sbom-main
          delete-branch: false
          title: "chore(sbom): update main SBOM"
          body: | 
            This pull request updates the main SBOM generated from the latest push to main.
            
            Triggering push details:
            - Commit: `#{{ github.sha }}`
            - Link: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            - Author: `${{ github.actor }}`
            - Message: `${{ github.event.head_commit.message || 'n/a' }}`
            
            Generated by workflow `${{ github.workflow }}` in run `${{ github.run_id }}`.

          labels: |
            automation
            sbom
