name: Main Branch SBOM

on:
  push:
    branches: [ main ]
    paths-ignore:
      - sbom/bom.json

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Generate CycloneDX SBOM
        run: ./mvnw -B -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.9.0:makeAggregateBom

      - name: Store SBOM in repository path
        run: |
          mkdir -p sbom
          jq 'del(.metadata.timestamp)' target/bom.json > sbom/bom.json

      - name: Check for meaningful SBOM changes
        id: sbom-diff
        run: |
          git diff --quiet sbom/bom.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create SBOM Update pull request
        if: steps.sbom-diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          commit-message: "chore(sbom): update main SBOM"
          branch: chore/sbom-main
          delete-branch: true
          title: "chore(sbom): update main SBOM"
          body: |
            This pull request updates the main SBOM generated from the latest push to main.

            Triggering push details:
            - Commit: `${{ github.sha }}`
            - Link: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            - Author: `${{ github.actor }}`
            - Message: `${{ github.event.head_commit.message || 'n/a' }}`

            Generated by workflow `${{ github.workflow }}` in run `${{ github.run_id }}`.

          labels: |
            automation
            sbom